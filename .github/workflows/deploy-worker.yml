name: Deploy WalletWallet Proxy

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run tests
        run: npm ci && npm test

      - name: Deploy Cloudflare Worker
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: "4"
          command: deploy
          secrets: |
            WALLETWALLET_API_KEY
        env:
          WALLETWALLET_API_KEY: ${{ secrets.WALLETWALLET_API_KEY }}

      - name: Rebuild GitHub Pages
        env:
          GH_TOKEN: ${{ github.token }}
          API_URL: ${{ steps.deploy.outputs.deployment-url }}
        run: gh workflow run deploy-pages.yml --field api_url="$API_URL" --repo "$GITHUB_REPOSITORY"
